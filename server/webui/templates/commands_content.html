<section class="commands-layout">
  <div class="commands-toolbar">
    <div class="commands-toolbar-search">
      <div class="search-input-wrap">
        <span class="search-input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
        </span>
        <input id="command-search" class="input search-input" type="text" placeholder="搜索命令名称 / 命令介绍 / 用法 / 权限" />
      </div>
    </div>
    <div class="panel-head-actions">
      <button id="reload-btn" type="button" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        刷新
      </button>
      <button id="save-all-btn" type="button" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
          <path d="M17 21v-8H7v8"></path>
          <path d="M7 3v5h8"></path>
        </svg>
        保存全部
      </button>
    </div>
  </div>

  <div id="status" class="alert hidden" role="status" aria-live="polite">
    <span id="status-message" class="alert-message"></span>
  </div>
  <div id="loading" class="empty">加载中...</div>
  <div id="empty" class="empty hidden">暂无可配置命令。</div>

  <div id="table-wrap" class="table-wrap hidden">
    <table class="command-table" aria-label="命令配置表格">
      <thead>
        <tr>
          <th>命令名称</th>
          <th>命令介绍</th>
          <th>用法</th>
          <th>权限</th>
          <th>状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="command-table-body"></tbody>
    </table>
  </div>
</section>

<div id="param-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="param-modal-title">
  <div class="modal-mask" data-modal-close="1"></div>
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="param-modal-title" class="modal-title">编辑参数</h3>
      <button id="modal-close-btn" type="button" class="btn btn-icon modal-close-btn" aria-label="关闭">✕</button>
    </div>
    <div id="param-modal-alert" class="alert info modal-alert hidden" role="status" aria-live="polite">
      <span id="param-modal-alert-message" class="alert-message"></span>
    </div>
    <div id="param-modal-body" class="modal-body"></div>
    <div class="modal-foot">
      <button id="modal-cancel-btn" type="button" class="btn">取消</button>
      <button id="modal-save-btn" type="button" class="btn btn-primary">保存参数</button>
    </div>
  </div>
</div>
