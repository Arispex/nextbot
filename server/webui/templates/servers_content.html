<section class="servers-layout">
  <div class="servers-toolbar">
    <div class="servers-toolbar-search">
      <div class="search-input-wrap">
        <span class="search-input-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
        </span>
        <input id="server-search" class="input search-input" type="text" placeholder="搜索服务器名称 / 地址 / 端口" />
      </div>
    </div>
    <div class="panel-head-actions">
      <button id="reload-btn" type="button" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
          <path d="M21 3v6h-6"></path>
        </svg>
        刷新
      </button>
      <button id="add-server-btn" type="button" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        创建服务器
      </button>
    </div>
  </div>

  <div id="status" class="alert hidden" role="status" aria-live="polite">
    <span id="status-message" class="alert-message"></span>
  </div>
  <div id="loading" class="empty">加载中...</div>
  <div id="empty" class="empty hidden">暂无服务器配置。</div>

  <div id="table-wrap" class="table-wrap hidden">
    <table class="server-table" aria-label="服务器管理表格">
      <thead>
        <tr>
          <th>ID</th>
          <th>服务器名称</th>
          <th>地址</th>
          <th>游戏端口</th>
          <th>REST API 端口</th>
          <th>Token</th>
          <th>连通性</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="server-table-body"></tbody>
    </table>
  </div>

  <div id="server-pagination" class="pagination-bar hidden">
    <div id="server-pagination-info" class="pagination-info"></div>
    <div class="pagination-controls">
      <label class="pagination-size">
        <span>每页</span>
        <select id="server-per-page" class="pagination-select">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
      <button id="server-prev-btn" type="button" class="btn">上一页</button>
      <button id="server-next-btn" type="button" class="btn">下一页</button>
    </div>
  </div>
</section>

<div id="server-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="server-modal-title">
  <div class="modal-mask" data-modal-close="1"></div>
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="server-modal-title" class="modal-title">创建服务器</h3>
      <button id="modal-close-btn" type="button" class="btn btn-icon modal-close-btn" aria-label="关闭">✕</button>
    </div>
    <div id="modal-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span id="modal-alert-message" class="alert-message"></span>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <label class="form-item">
          <span class="form-label">服务器名称</span>
          <input id="field-name" class="input" type="text" maxlength="32" placeholder="主服" />
        </label>
        <label class="form-item">
          <span class="form-label">地址</span>
          <input id="field-ip" class="input" type="text" placeholder="127.0.0.1 / server.example.com" />
        </label>
        <label class="form-item">
          <span class="form-label">游戏端口</span>
          <input id="field-game-port" class="input" type="number" min="1" max="65535" placeholder="7777" />
        </label>
        <label class="form-item">
          <span class="form-label">REST API 端口</span>
          <input id="field-restapi-port" class="input" type="number" min="1" max="65535" placeholder="7878" />
        </label>
      </div>

      <label class="form-item">
        <span class="form-label">Token</span>
        <div class="token-input-wrap">
          <input id="field-token" class="input token-input" type="password" minlength="1" maxlength="128" placeholder="请输入 Token" />
          <button id="modal-token-toggle" type="button" class="token-input-toggle" aria-label="显示 Token" title="显示 Token">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </label>
    </div>
    <div class="modal-foot">
      <button id="modal-cancel-btn" type="button" class="btn">取消</button>
      <button id="modal-save-btn" type="button" class="btn btn-primary">保存</button>
    </div>
  </div>
</div>

<div id="delete-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
  <div class="modal-mask" data-delete-modal-close="1"></div>
  <div class="modal-card confirm-modal-card">
    <div class="modal-head">
      <h3 id="delete-modal-title" class="modal-title">删除服务器</h3>
      <button id="delete-modal-close-btn" type="button" class="btn btn-icon modal-close-btn" aria-label="关闭">✕</button>
    </div>
    <div id="delete-modal-alert" class="alert hidden modal-alert" role="status" aria-live="polite">
      <span id="delete-modal-alert-message" class="alert-message"></span>
    </div>
    <div class="modal-body confirm-modal-body">
      <p id="delete-modal-text" class="confirm-modal-text"></p>
    </div>
    <div class="modal-foot">
      <button id="delete-modal-cancel-btn" type="button" class="btn">取消</button>
      <button id="delete-modal-confirm-btn" type="button" class="btn btn-danger">确认删除</button>
    </div>
  </div>
</div>
